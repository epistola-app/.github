# Epistola Board — GitHub Project Configuration
#
# This file is the source of truth for the project structure.
# Changes are synced via .github/workflows/project-sync.yml
#
# To modify the project:
# 1. Edit this file
# 2. Push to main branch
# 3. The workflow will sync changes to GitHub Projects

project:
  title: "Epistola Board"
  owner: "epistola-app"
  description: "Unified board for all Epistola work — triage, prioritization, execution, and roadmap"

  # All org repos are auto-linked by the sync script.
  # This list is only for verification — repos listed here
  # will cause a warning if not linked after sync.
  verify_repositories:
    - epistola-suite
    - epistola-contract
    - epistola-control
    - epistola-infra
    - epistola-docs
    - roadmap
    - .github
    - internal
    - org-nl-sittard-geleen
    - org-app-epistola-demo

fields:
  # Status workflow (kanban)
  - name: Status
    type: single_select
    options:
      - name: "Triage"
        color: PINK
        description: "Newly added, needs assessment"
      - name: "Backlog"
        color: GRAY
        description: "Assessed, not yet prioritized for work"
      - name: "Ready"
        color: BLUE
        description: "Ready to be picked up"
      - name: "In Progress"
        color: YELLOW
        description: "Currently being worked on"
      - name: "Blocked"
        color: RED
        description: "Blocked by dependency or external factor"
      - name: "In Review"
        color: PURPLE
        description: "In code review"
      - name: "Done"
        color: GREEN
        description: "Completed"

  # Priority
  - name: Priority
    type: single_select
    options:
      - name: "P0 Critical"
        color: RED
        description: "Must be done immediately"
      - name: "P1 High"
        color: ORANGE
        description: "Important, do soon"
      - name: "P2 Medium"
        color: YELLOW
        description: "Normal priority"
      - name: "P3 Low"
        color: GRAY
        description: "Nice to have"

  # Size estimation
  - name: Size
    type: single_select
    options:
      - name: "XS"
        color: GREEN
        description: "< 2 hours"
      - name: "S"
        color: BLUE
        description: "Half day"
      - name: "M"
        color: YELLOW
        description: "1-2 days"
      - name: "L"
        color: ORANGE
        description: "3-5 days"
      - name: "XL"
        color: RED
        description: "> 1 week"

  # Item type ("Type" is reserved by GitHub)
  - name: Item Type
    type: single_select
    options:
      - name: "Epic"
        color: BLUE
        description: "Large initiative spanning weeks/months"
      - name: "Story"
        color: BLUE
        description: "Vertical slice of work, fits in 1-2 weeks"
      - name: "Feature"
        color: GREEN
        description: "New functionality"
      - name: "Bug"
        color: RED
        description: "Something broken"
      - name: "Alert"
        color: ORANGE
        description: "Security or monitoring alert"
      - name: "Tech Debt"
        color: PURPLE
        description: "Code quality improvement"
      - name: "Chore"
        color: GRAY
        description: "Maintenance task"
      - name: "Pull Request"
        color: PURPLE
        description: "Pull request awaiting review"

  # Tracking fields
  - name: "Target Date"
    type: date

  - name: "Started At"
    type: date

  - name: "Blocked Reason"
    type: text
